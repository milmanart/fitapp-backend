spring:
  application:
    name: fitapp-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:fitapp}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

usda:
  fdc:
    enabled: ${USDA_FDC_ENABLED:true}
    api-key: ${USDA_API_KEY:DEMO_KEY}
    base-url: ${USDA_API_BASE_URL:https://api.nal.usda.gov/fdc/v1/foods/search}
    seed-on-startup: ${USDA_FDC_SEED_ON_STARTUP:true}

logging:
  level:
    root: INFO
    pl.fitapp: INFO

vision:
  groq:
    api-key: ${GROQ_API_KEY:}
    model: meta-llama/llama-4-scout-17b-16e-instruct
    base-url: https://api.groq.com/openai/v1/chat/completions

github:
  copilot:
    github-token: ${GITHUB_COPILOT_TOKEN:}
    token-url: https://api.github.com/copilot_internal/v2/token
    api-url: https://api.individual.githubcopilot.com
    model: gpt-5-mini
