
services:
  postgres:
    image: postgres:16-alpine
    container_name: fitapp-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-fitapp}
      POSTGRES_USER: ${DB_USERNAME:-fitapp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-fitapp} -d ${DB_NAME:-fitapp}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
